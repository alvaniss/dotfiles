source = colors.conf

general {
    gaps_in = 4
    gaps_out = 6
    border_size = 2
    col.active_border = $outline
    col.inactive_border = $outline_variant
    resize_on_border = true
    extend_border_grab_area = 15
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10

    shadow {
        enabled = true
        range = 12
        render_power = 6
        color = $shadow
        color_inactive = $shadow
        offset = 0 0
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        contrast = 1.2
        brightness = 0.8
        vibrancy = 0.2
        vibrancy_darkness = 0.2
        noise = 0
        ignore_opacity = true
        new_optimizations = on
    }
    active_opacity = 1
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
}

group {
    col.border_active = $outline
    col.border_inactive = $outline_variant
    col.border_locked_active = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = smooth, 0.23, 1, 0.32, 1
    bezier = slide, 0.165, 0.84, 0.44, 1
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 3, smooth, slidefade 20%
    animation = specialWorkspace, 1, 3, overshot, slidefade 15%
}

gestures {
    gesture = 3, left, dispatcher, workspace, -1
    gesture = 3, right, dispatcher, workspace, +1
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    background_color = $background
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}

env = GUM_CONFIRM_PROMPT_FOREGROUND,6
env = GUM_CONFIRM_SELECTED_FOREGROUND,0
env = GUM_CONFIRM_SELECTED_BACKGROUND,2
env = GUM_CONFIRM_UNSELECTED_FOREGROUND,7
env = GUM_CONFIRM_UNSELECTED_BACKGROUND,8
