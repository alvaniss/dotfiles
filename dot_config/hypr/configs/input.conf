input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    repeat_rate = 40
    repeat_delay = 600
    numlock_by_default = true
    accel_profile = flat
    sensitivity = 0.55
    touchpad {
        scroll_factor = 0.4
  }
}

misc {
    key_press_enables_dpms = true # key press will trigger wake
    mouse_move_enables_dpms = true # mouse move will trigger wake
}
